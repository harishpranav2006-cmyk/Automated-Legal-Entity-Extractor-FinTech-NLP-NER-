# docker-compose.yml — Akshada
# Orchestrates the LexiScan Auto API service.
#
# Usage:
#   docker-compose up --build          # First run
#   docker-compose up                  # Subsequent runs
#   docker-compose down                # Stop and remove containers
#   docker-compose logs -f lexiscan    # View live logs

version: "3.9"

services:
  lexiscan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexiscan_auto_api
    image: lexiscan-auto:1.0.0

    ports:
      - "8000:8000"

    volumes:
      # Mount local data and model directories so you can:
      # - Drop PDFs into data/raw/ from your host machine
      # - Persist trained models between container restarts
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - LOG_LEVEL=INFO

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
