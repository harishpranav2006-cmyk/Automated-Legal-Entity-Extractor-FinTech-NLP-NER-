# config/model_config.cfg — Akshada
# spaCy NER Training Configuration
# Used by train_spacy.py

[training]
max_epochs = 30
patience = 5
batch_size = 8
dropout = 0.2
learn_rate = 0.001
eval_frequency = 100
seed = 42

[model]
base_model = "en_core_web_sm"
labels = ["PARTY", "DATE", "AMOUNT", "JURISDICTION"]

[paths]
train  = "data/annotated/train.jsonl"
dev    = "data/annotated/dev.jsonl"
output = "models/spacy_ner"

[logging]
level = "INFO"