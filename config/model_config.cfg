# model_config.cfg
# Owner: Akshada
# Task 2, Week 2 — spaCy Training Configuration
#
# Use spaCy's built-in config system for training.
# Generate a full config with:
#   python -m spacy init config config/model_config.cfg --lang en --pipeline ner
#
# Then customize the [training] section below with the project values.

# TODO (Akshada): Run `python -m spacy init config` to generate a base config,
# then update the values below to match the project requirements.

[training]
max_epochs = 30
patience = 5
eval_frequency = 100
frozen_components = []

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
discard_oversize = false
tolerance = 0.2

[training.batcher.size]
@schedules = "compounding.v1"
start = 100
stop = 1000
compound = 1.001

[training.optimizer]
@optimizers = "Adam.v1"
beta1 = 0.9
beta2 = 0.999
L2_is_weight_decay = true
L2 = 0.01
grad_clip = 1.0
use_averages = false
eps = 1e-8
